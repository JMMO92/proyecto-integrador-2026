<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar evento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🌐 Eventos Locales</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarPrincipal">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarPrincipal">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">🏠 Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="listar-usuarios.html">👤 Usuarios</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="listar-categorias.html">🏷️ Categorías</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="listar-eventos.html">🎉 Eventos</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="bg-warning py-3">
        <div class="container">
            <h1 class="h3 mb-0">Editar Evento</h1>
        </div>
    </header>

    <main class="container py-4">
        <section class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow">
                    <div class="card-body">

                        <div id="mensajeEvento" class="mb-3"></div>

                        <form id="formEditarEvento">
                            <div class="mb-3">
                                <label for="txtNombreEvento" class="form-label">Nombre del evento</label>
                                <input type="text" class="form-control" id="txtNombreEvento" required>
                            </div>

                            <div class="mb-3">
                                <label for="txtDescripcionEvento" class="form-label">Descripción</label>
                                <textarea class="form-control" id="txtDescripcionEvento" rows="3" required></textarea>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="txtFechaEvento" class="form-label">Fecha</label>
                                    <input type="date" class="form-control" id="txtFechaEvento" required>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label for="txtHoraEvento" class="form-label">Hora</label>
                                    <input type="time" class="form-control" id="txtHoraEvento" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="txtLugarEvento" class="form-label">Lugar</label>
                                <input type="text" class="form-control" id="txtLugarEvento" required>
                            </div>

                            <div class="mb-3">
                                <label for="sltCategoriaEvento" class="form-label">Categoría</label>
                                <select class="form-select" id="sltCategoriaEvento" required>
                                    <option value="">Cargando categorías...</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="sltEstadoEvento" class="form-label">Estado</label>
                                <select class="form-select" id="sltEstadoEvento" required>
                                    <option value="">Seleccione una opción</option>
                                    <option value="Activo">Activo</option>
                                    <option value="Cancelado">Cancelado</option>
                                    <option value="Finalizado">Finalizado</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="txtImagenEvento" class="form-label">Imagen del evento (URL opcional)</label>
                                <input 
                                    type="url" 
                                    class="form-control" 
                                    id="txtImagenEvento" 
                                    placeholder="https://ejemplo.com/imagen.jpg"
                                >
                                <div class="form-text">
                                    Puede cambiar la imagen o dejar el campo vacío para removerla.
                                </div>
                            </div>

                            <button type="submit" class="btn btn-warning w-100">
                                💾 Guardar cambios
                            </button>

                            <a href="listar-eventos.html" class="btn btn-secondary w-100 mt-2">
                                ⬅Volver al listado
                            </a>
                        </form>

                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/editar-evento.js"></script>
</body>
</html>
