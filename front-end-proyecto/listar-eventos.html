<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de eventos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🌐 Eventos Locales</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarPrincipal">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarPrincipal">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">🏠 Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="listar-usuarios.html">👤 Usuarios</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="listar-categorias.html">🏷️ Categorías</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="listar-eventos.html">🎉 Eventos</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="bg-dark text-white py-3">
        <div class="container">
            <h1 class="h3 mb-0">Listado General de Eventos</h1>
        </div>
    </header>

    <main class="container py-4">

        <section class="card shadow mb-4">
            <div class="card-body">
                <h2 class="h5 mb-3">Filtros</h2>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label for="sltFiltroCategoria" class="form-label">Filtrar por categoría</label>
                        <select class="form-select" id="sltFiltroCategoria">
                            <option value="">Todas las categorías</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="txtFiltroFecha" class="form-label">Filtrar por fecha</label>
                        <input type="date" class="form-control" id="txtFiltroFecha">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="sltFiltroEstado" class="form-label">Consultar por estado</label>
                        <select class="form-select" id="sltFiltroEstado">
                            <option value="">Todos los estados</option>
                            <option value="Activo">Activo</option>
                            <option value="Cancelado">Cancelado</option>
                            <option value="Finalizado">Finalizado</option>
                        </select>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button class="btn btn-primary" id="btnFiltrar">🔄 Aplicar filtros</button>
                    <button class="btn btn-secondary" id="btnLimpiarFiltros">❌ Limpiar filtros</button>
                </div>
            </div>
        </section>

        <section class="card shadow">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle" id="tblEventos">
                        <thead class="table-dark">
                            <tr>
                                <th>Nombre</th>
                                <th>Descripción</th>
                                <th>Fecha</th>
                                <th>Hora</th>
                                <th>Lugar</th>
                                <th>Categoría</th>
                                <th>Estado</th>
                                <th>Detalle</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Aquí se cargan los eventos -->
                        </tbody>
                    </table>
                </div>
                <div class="mt-3">
                    <a href="index.html" class="btn btn-outline-dark">
                        ⬅ Volver al inicio
                    </a>
                </div>
            </div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/listar-eventos.js"></script>
</body>
</html>
