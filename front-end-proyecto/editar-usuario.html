<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🌐 Eventos Locales</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarPrincipal">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarPrincipal">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">🏠 Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="listar-usuarios.html">👤 Usuarios</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="listar-categorias.html">🏷️ Categorías</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="listar-eventos.html">🎉 Eventos</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="bg-warning py-3">
        <div class="container">
            <h1 class="h3 mb-0">Editar Usuario</h1>
        </div>
    </header>

    <main class="container py-4">
        <section class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow">
                    <div class="card-body">

                        <div id="mensaje" class="mb-3"></div>

                        <form id="formEditarUsuario">
                            <div class="mb-3">
                                <label for="txtNombre" class="form-label">Nombre</label>
                                <input type="text" class="form-control" id="txtNombre" required>
                            </div>

                            <div class="mb-3">
                                <label for="txtCedula" class="form-label">Cédula</label>
                                <input type="text" class="form-control" id="txtCedula" disabled>
                            </div>

                            <div class="mb-3">
                                <label for="txtCorreo" class="form-label">Correo electrónico</label>
                                <input type="email" class="form-control" id="txtCorreo" required>
                                <div class="invalid-feedback">
                                    Ingrese un correo válido.
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="sltUsuario" class="form-label">Tipo de usuario</label>
                                <select class="form-select" id="sltUsuario" required>
                                    <option value="">Seleccione una opción</option>
                                    <option value="Administrador">Administrador</option>
                                    <option value="Cliente">Cliente</option>
                                    <option value="Vendedor">Vendedor</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-warning w-100">
                                💾 Guardar cambios
                            </button>

                            <a href="listar-usuarios.html" class="btn btn-secondary w-100 mt-2">
                                ⬅ Volver al listado
                            </a>
                        </form>

                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/editar-usuario.js"></script>
</body>
</html>
