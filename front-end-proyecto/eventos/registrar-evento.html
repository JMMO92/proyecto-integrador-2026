<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrar evento</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <header class="bg-primary text-white py-3">
      <div class="container">
        <h1 class="h3 mb-0">Registro de Evento</h1>
      </div>
    </header>

    <main class="container py-4">
      <section class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div class="card shadow">
            <div class="card-body">
              <form id="formRegistrarEvento">
                <div class="mb-3">
                  <label for="txtNombre" class="form-label">Nombre</label>
                  <input
                    type="text"
                    class="form-control"
                    id="txtNombre"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="txtDescripcion" class="form-label"
                    >Descripción</label
                  >
                  <textarea
                    class="form-control"
                    id="txtDescripcion"
                    rows="3"
                    required
                  ></textarea>
                </div>

                <div class="mb-3">
                  <label for="txtFecha" class="form-label">Fecha</label>
                  <input
                    type="date"
                    class="form-control"
                    id="txtFecha"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="txtLugar" class="form-label">Lugar</label>
                  <input
                    type="text"
                    class="form-control"
                    id="txtLugar"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="txtHora" class="form-label">Hora</label>
                  <input
                    type="time"
                    class="form-control"
                    id="txtHora"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="sltCategoria" class="form-label">Categoría</label>
                  <select class="form-select" id="sltCategoria" required>
                    <option value="">Seleccione una categoría</option>
                    <!-- Se llena dinámicamente -->
                  </select>
                </div>

                <div class="mb-3">
                  <label for="sltEstado" class="form-label">Estado</label>
                  <select class="form-select" id="sltEstado" required>
                    <option value="Activo">Activo</option>
                    <option value="Cancelado">Cancelado</option>
                    <option value="Finalizado">Finalizado</option>
                  </select>
                </div>

                <div id="mensaje" class="mb-3"></div>

                <button type="submit" class="btn btn-primary w-100">
                  Registrar evento
                </button>
                <button type="submit" class="btn btn-danger w-100 mt-2" onclick="cancelarRegistro()">
                  Regresar
                </button>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="registrar-eventos.js"></script>
  </body>
</html>
