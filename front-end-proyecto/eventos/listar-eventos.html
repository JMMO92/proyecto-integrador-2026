<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Tabla de Eventos</title>

    <!-- Bootstrap (asegúrate de tenerlo en tu proyecto) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>

  <body class="bg-light">

    <header class="bg-primary text-white py-3">
      <div class="container">
        <h1 class="h3 mb-0">Listado de Eventos</h1>
      </div>
    </header>

    <main class="container py-4">
      <section class="card shadow">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h5 mb-0">Gestión de Eventos</h2>
            <button type="button" class="btn btn-primary" onclick="detalleDeEvento()">
              <i class="bi bi-plus-circle"></i> detalle de evento
            </button>
            <button type="button" class="btn btn-success" onclick="crearEvento()">
              <i class="bi bi-plus-circle"></i> Crear Evento
            </button>
            <button type="button" class="btn btn-warning" onclick="detalleDeEvento()">
              <i class="bi bi-plus-circle"></i> Editar Evento
            </button>
            <button type="button" class="btn btn-danger" onclick="crearEvento()">
              <i class="bi bi-plus-circle"></i> Eliminar Evento
            </button>
          </div>

          <div class="table-responsive">
            <table class="table table-striped table-hover" id="tblEventos">
              
              <caption class="text-muted">
                Eventos registrados en el sistema
              </caption>

              <thead class="table-dark">
                <tr>
                  <th scope="col">Nombre</th>
                  <th scope="col">Descripción</th>
                  <th scope="col">Fecha</th>
                  <th scope="col">Hora</th>
                  <th scope="col">Lugar</th>
                  <th scope="col">Categoría</th>
                  <th scope="col">Estado</th>
                </tr>
              </thead>

              <tbody id="tablaEventos" onclick="seleccionarEvento(event)" clickable="true">
                <!-- Datos dinámicos -->
              </tbody>

            </table>
          </div>

        </div>
      </section>
    </main>

  </body>s
  <script src="listar-eventos.js"></script>
</html>
