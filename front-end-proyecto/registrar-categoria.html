<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar categoría</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🌐 Eventos Locales</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarPrincipal">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarPrincipal">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">🏠 Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="listar-usuarios.html">👤 Usuarios</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="listar-categorias.html">🏷️ Categorías</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="listar-eventos.html">🎉 Eventos</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="bg-success text-white py-3">
        <div class="container">
            <h1 class="h3 mb-0">Registro de Categoría</h1>
        </div>
    </header>

    <main class="container py-4">
        <section class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow">
                    <div class="card-body">
                        <form id="formRegistrarCategoria">
                            <div class="mb-3">
                                <label for="txtNombreCategoria" class="form-label">Nombre</label>
                                <input type="text" class="form-control" id="txtNombreCategoria" required>
                            </div>

                            <div class="mb-3">
                                <label for="txtDescripcionCategoria" class="form-label">Descripción</label>
                                <textarea class="form-control" id="txtDescripcionCategoria" rows="3" required></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="sltEstadoCategoria" class="form-label">Estado</label>
                                <select class="form-select" id="sltEstadoCategoria" required>
                                    <option value="">Seleccione una opción</option>
                                    <option value="Activa">Activa</option>
                                    <option value="Inactiva">Inactiva</option>
                                </select>
                            </div>

                            <div id="mensajeCategoria" class="mb-3"></div>

                            <button type="submit" class="btn btn-success w-100">
                                ➕ Registrar categoría
                            </button>
                            <a href="index.html" class="btn btn-secondary w-100 mt-2">
                                ⬅ Volver al inicio
                            </a>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/registrar-categoria.js"></script>
</body>
</html>
