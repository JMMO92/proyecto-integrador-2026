<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtro por Estado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <header class="bg-primary text-white py-3">
        <div class="container">
            <h1 class="h3 mb-0">Filtro de Eventos por Estado</h1>
        </div>
    </header>
    <main class="container py-4">
        <section class="card shadow mb-4">
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label for="selectEstado" class="form-label">Estado</label>
                        <select id="selectEstado" class="form-select">
                            <option value="">Seleccione un estado</option>
                            <option value="Activo">Activo</option>
                            <option value="Cancelado">Cancelado</option>
                            <option value="Finalizado">Finalizado</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-primary w-100" onclick="filtrar()">Filtrar</button>
                    </div>
                </div>
            </div>
        </section>
        <section class="card shadow">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover" id="tblEventos">
                        <thead class="table-dark">
                            <tr>
                                <th>Nombre</th>
                                <th>Fecha</th>
                                <th>Hora</th>
                                <th>Lugar</th>
                                <th>Categoría</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Aquí se cargan los eventos -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
    <script src="./js/filtrar-por-estado.js"></script>
</body>
</html>
