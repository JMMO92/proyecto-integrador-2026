<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <header class="bg-dark text-white py-3">
        <div class="container">
            <h1 class="h3 mb-0">Registro de Usuario</h1>
        </div>
    </header>

    <main class="container py-4">
        <section class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow">
                    <div class="card-body">
                        <form id="formRegistrarUsuario">
                            <div class="mb-3">
                                <label for="txtNombre" class="form-label">Nombre</label>
                                <input type="text" class="form-control" id="txtNombre" required>
                            </div>

                            <div class="mb-3">
                                <label for="txtCedula" class="form-label">Cédula</label>
                                <input type="text" class="form-control" id="txtCedula" required>
                            </div>

                            <div class="mb-3">
                                <label for="txtCorreo" class="form-label">Correo electrónico</label>
                                <input type="email" class="form-control" id="txtCorreo" required>
                            </div>

                            <div class="mb-3">
                                <label for="sltUsuario" class="form-label">Tipo de usuario</label>
                                <select class="form-select" id="sltUsuario" required>
                                    <option value="">Seleccione una opción</option>
                                    <option value="Administrador">Administrador</option>
                                    <option value="Cliente">Cliente</option>
                                    <option value="Vendedor">Vendedor</option>
                                </select>
                            </div>

                            <div id="mensaje" class="mb-3"></div>

                            <button type="submit" class="btn btn-primary w-100">
                                Registrar usuario
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="./js/registrar-usuario.js"></script>
</body>
</html>
